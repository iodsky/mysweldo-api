services:
  spring:
    container_name: my-sweldo-server
    image: ghcr.io/iodsky/my-sweldo-api:latest
    restart: always
    ports:
      - 8001:8001
    env_file:
      - .env
    labels:
      - "traefik.http.routers.my-sweldo-api.rule=Host(`my-sweldo.iodsky.com`)"
      - "traefik.http.routers.my-sweldo-api.entrypoints=websecure"
      - "traefik.http.routers.my-sweldo-api.tls.certresolver=myresolver"
      - "traefik.http.services.my-sweldo-api.loadbalancer.server.port=8001"
    networks:
      - my-sweldo-network
      - traefik

  watchtower:
    image: containrrr/watchtower
    restart: always
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      WATCHTOWER_CLEANUP: "true"
      WATCHTOWER_POLL_INTERVAL: 1800
      WATCHTOWER_INCLUDE_RESTARTING: "true"
    command: --cleanup spring
    networks:
      - my-sweldo-network

volumes:
  my-sweldo-postgres-data:

networks:
  my-sweldo-network:
  traefik:
    external: true