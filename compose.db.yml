services:
  postgresql:
    container_name: my-sweldo-db
    image: "postgres:latest"
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${LOCAL_DB}
      POSTGRES_USER: ${LOCAL_DB_USER}
      POSTGRES_PASSWORD: ${LOCAL_DB_PASSWORD}
    ports:
      - 5432:5432
    volumes:
      - my-sweldo-postgres-data:/var/lib/postgresql/data

volumes:
  my-sweldo-postgres-data:
